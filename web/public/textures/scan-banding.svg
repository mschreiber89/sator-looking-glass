<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" preserveAspectRatio="none">
  <defs>
    <pattern id="bands" width="600" height="3" patternUnits="userSpaceOnUse">
      <rect width="600" height="0.6" y="0" fill="#000" opacity="0.05"/>
      <rect width="600" height="0.3" y="2" fill="#000" opacity="0.03"/>
    </pattern>
    <linearGradient id="edgevig" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#000" stop-opacity="0.18"/>
      <stop offset="0.08" stop-color="#000" stop-opacity="0"/>
      <stop offset="0.92" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="edgevig2" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#000" stop-opacity="0.14"/>
      <stop offset="0.06" stop-color="#000" stop-opacity="0"/>
      <stop offset="0.94" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.14"/>
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bands)"/>
  <rect width="600" height="800" fill="url(#edgevig)"/>
  <rect width="600" height="800" fill="url(#edgevig2)"/>
</svg>
