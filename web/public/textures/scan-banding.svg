<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" preserveAspectRatio="none">
  <defs>
    <pattern id="bands" width="600" height="3" patternUnits="userSpaceOnUse">
      <rect width="600" height="0.8" y="0" fill="#1a1208" opacity="0.10"/>
      <rect width="600" height="0.5" y="2" fill="#1a1208" opacity="0.06"/>
    </pattern>
    <linearGradient id="edgevig" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#000" stop-opacity="0.32"/>
      <stop offset="0.10" stop-color="#000" stop-opacity="0"/>
      <stop offset="0.90" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.32"/>
    </linearGradient>
    <linearGradient id="edgevig2" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#000" stop-opacity="0.25"/>
      <stop offset="0.07" stop-color="#000" stop-opacity="0"/>
      <stop offset="0.93" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.25"/>
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bands)"/>
  <rect width="600" height="800" fill="url(#edgevig)"/>
  <rect width="600" height="800" fill="url(#edgevig2)"/>
</svg>
