[toolchain]
package_manager = "pnpm"

[features]
resolution = true
skip-lint = false

[programs.localnet]
looking_glass = "GTEVyfq7zL91k1zjZrJCmkeidBvgDfMdEXUUsMcQWq5r"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "cargo test --manifest-path programs/looking_glass/Cargo.toml --lib --quiet && pnpm exec ts-mocha -p ./tsconfig.json -t 1000000 \"programs/looking_glass/tests/**/*.ts\""
