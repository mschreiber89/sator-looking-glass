[toolchain]
package_manager = "pnpm"

[features]
resolution = true
skip-lint = false

[programs.localnet]
looking_glass = "EbacNay4EHbELApeWW11taBkForWW9qkZcGYFJGvuxKu"

[programs.devnet]
looking_glass = "EbacNay4EHbELApeWW11taBkForWW9qkZcGYFJGvuxKu"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "devnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "cargo test --manifest-path programs/looking_glass/Cargo.toml --lib --quiet && pnpm exec ts-mocha -p ./tsconfig.json -t 1000000 \"programs/looking_glass/tests/**/*.ts\""
